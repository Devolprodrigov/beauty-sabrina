<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Catálogo Sabrina Beauty com carrinho, painel de gestão e pedidos por WhatsApp." />
    <title>Sabrina Beauty</title>

    <link rel="stylesheet" href="styles.css" />

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script defer src="script.js"></script>
  </head>

  <body>

    <!-- HEADER -->
    <header class="topbar">
      <button class="brand" id="goShop">
        <div class="brand-badge">SB</div>
        <div>
          <h1>SABRINA BEAUTY</h1>
          <p>Revendedor Oficial</p>
        </div>
      </button>

      <div class="header-actions">
        <button class="icon-btn" id="openAdmin">⚙️</button>

        <button class="icon-btn cart-btn" id="openCart">
          🛍️
          <span class="badge" id="cartCount">0</span>
        </button>
      </div>
    </header>

    <!-- MAIN -->
    <main class="container">

      <!-- LOJA -->
      <section class="view active" id="view-shop">
        <h2>Produtos</h2>
        <div id="productsGrid" class="products-grid"></div>
      </section>

      <!-- CARRINHO FINAL -->
      <section class="view" id="view-cart">
        <button id="backToShop">← Voltar</button>
        <div id="cartContent"></div>
      </section>

      <!-- ADMIN (OCULTO PARA CLIENTE) -->
      <section class="view" id="view-admin">
        <h2>Painel de Gestão</h2>

        <input id="newName" placeholder="Nome" />
        <input id="newPrice" placeholder="Preço" />
        <input id="newStock" placeholder="Estoque" />
        <input id="newCategory" placeholder="Categoria" />
        <textarea id="newDescription" placeholder="Descrição"></textarea>
        <input id="newImageUrl" placeholder="URL da imagem" />

        <button id="addProductBtn">Cadastrar</button>

        <div id="adminList"></div>
      </section>

    </main>

    <!-- 🔥 POPUP DO CARRINHO -->
    <div id="cartPopup" class="cart-popup hidden">
      <div class="cart-popup-box">

        <div class="cart-popup-header">
          <h3>Seu carrinho</h3>
          <button id="closeCartPopup">✕</button>
        </div>

        <div id="cartPopupContent"></div>

        <div class="cart-popup-footer">
          <button id="goToCheckout" class="primary-btn">
            Fechar pedido
          </button>
        </div>

      </div>
    </div>

    <!-- MENU -->
    <nav class="bottom-nav">
      <button data-view="shop" class="nav-btn active">Loja</button>
      <button data-view="cart" class="nav-btn">Pedido</button>
      <!-- Gestão escondido -->
      <!-- <button data-view="admin" class="nav-btn">Gestão</button> -->
    </nav>

  </body>
</html>
