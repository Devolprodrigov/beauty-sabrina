<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sabrina Beauty pedidos por WhatsApp."
    />

    <title>Sabrina Beauty</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://beauty-sabrina.vercel.app/" />
    <meta property="og:title" content="Sabrina Beauty | Compras Online" />
    <meta
      property="og:description"
      content="Sabrina Beauty pedidos por WhatsApp."
    />
    <meta property="og:image" content="https://beauty-sabrina.vercel.app/og-image.jpeg" />
    <meta property="og:image:alt" content="Logo e apresentação do site Sabrina Beauty" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://beauty-sabrina.vercel.app/" />
    <meta name="twitter:title" content="Sabrina Beauty | Compras Online" />
    <meta
      name="twitter:description"
      content="Confira nosso catálogo com carrinho e pedidos via WhatsApp."
    />
    <meta name="twitter:image" content="https://beauty-sabrina.vercel.app/og-image.jpeg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script defer src="script.js"></script>
  </head>

  <body>
    <div class="bg-decoration bg-1"></div>
    <div class="bg-decoration bg-2"></div>
    <div class="bg-decoration bg-3"></div>

    <header class="topbar">
      <button class="brand" id="goShop" aria-label="Ir para a loja">
        <div class="brand-badge">SB</div>
        <div>
          <h1>SABRINA BEAUTY</h1>
          <p>Revendedor Oficial</p>
        </div>
      </button>

      <div class="header-actions">
        <button class="icon-btn cart-btn" id="openCart" aria-label="Abrir carrinho">
          🛍️
          <span class="badge" id="cartCount">0</span>
        </button>
      </div>
    </header>

    <main class="container">
      <section class="view active" id="view-shop">
        <div class="section-title">
          <h2>Coleção Exclusiva</h2>
          <div class="divider"></div>
          <p>Escolha seus produtos, acompanhe o carrinho e finalize pelo WhatsApp.</p>
        </div>

        <div id="productsGrid" class="products-grid"></div>
      </section>

      <section class="view" id="view-cart">
        <button class="link-back" id="backToShop">← Continuar comprando</button>
        <div id="cartContent"></div>
      </section>

      <section class="view" id="view-admin">
        <div class="admin-header">
          <div>
            <h2>Painel de Gestão</h2>
            <p>Cadastre, visualize e exporte seus produtos.</p>
          </div>
          <button class="secondary-btn" id="exportPdfBtn">Exportar PDF</button>
        </div>

        <section class="card admin-form">
          <h3>Novo produto</h3>

          <div class="form-grid">
            <label>
              <span>Nome</span>
              <input id="newName" type="text" placeholder="Ex: Óleo de Rosa Mosqueta" />
            </label>

            <label>
              <span>Preço (R$)</span>
              <input id="newPrice" type="number" step="0.01" placeholder="0.00" />
            </label>

            <label>
              <span>Categoria</span>
              <input id="newCategory" type="text" placeholder="Ex: Skincare" />
            </label>

            <label>
              <span>Estoque</span>
              <input id="newStock" type="number" step="1" placeholder="0" />
            </label>

            <label class="full">
              <span>Descrição</span>
              <textarea id="newDescription" placeholder="Descreva o produto..."></textarea>
            </label>

            <label class="full">
              <span>Imagem</span>
              <input id="newImageUrl" type="text" placeholder="Cole a URL da imagem" />
              <small>Você também pode deixar vazio e usar a imagem padrão.</small>
            </label>
          </div>

          <button class="primary-btn" id="addProductBtn">Cadastrar produto</button>
        </section>

        <section>
          <h3 class="subheading">Inventário atual</h3>
          <div id="adminList" class="admin-list"></div>
        </section>
      </section>
    </main>

    <div id="cartPopup" class="cart-popup hidden">
      <div class="cart-popup-box">
        <div class="cart-popup-header">
          <h3>Seu carrinho</h3>
          <button id="closeCartPopup" class="icon-btn" type="button" aria-label="Fechar popup">✕</button>
        </div>

        <div id="cartPopupContent" class="cart-popup-content"></div>

        <div class="cart-popup-footer">
          <button id="goToCheckout" class="primary-btn" type="button">Fechar pedido</button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <button data-view="shop" class="nav-btn active">Loja</button>
      <button data-view="cart" class="nav-btn">Pedido</button>
    </nav>
  </body>
</html>
